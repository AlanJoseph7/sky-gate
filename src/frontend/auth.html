<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyGate — Authenticate</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0a'/%3E%3Ccircle cx='16' cy='16' r='12' stroke='%2300d4ff' stroke-opacity='0.3' stroke-width='1'/%3E%3Cline x1='16' y1='16' x2='25' y2='9' stroke='%2300d4ff' stroke-width='1.4'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        /*
         * ── Critical variable fallbacks ────────────────────────────────
         * These ensure the auth page renders even if styles.css fails to
         * load or a variable is undefined. They mirror the dark-theme
         * values from your main stylesheet.
         */
        :root,
        [data-theme="dark"] {
            --accent:              #3adfff;
            --accent-dim:          rgba(58, 223, 255, 0.15);
            --text:                #e8eaf0;
            --text-muted:          #6b7280;
            --border:              rgba(255, 255, 255, 0.08);
            --glass-bg:            rgba(10, 12, 20, 0.72);
            --glass-border:        rgba(255, 255, 255, 0.07);
            --glass-border-top:    rgba(255, 255, 255, 0.14);
            --glass-blur:          blur(20px) saturate(160%);
            --glass-shadow-hover:  0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(58, 223, 255, 0.06);
            --r-lg:                10px;
            --r-2xl:               20px;
            --ease-out:            cubic-bezier(0.22, 1, 0.36, 1);
        }

        [data-theme="light"] {
            --accent:              #0284c7;
            --accent-dim:          rgba(2, 132, 199, 0.12);
            --text:                #0f172a;
            --text-muted:          #64748b;
            --border:              rgba(0, 0, 0, 0.1);
            --glass-bg:            rgba(255, 252, 245, 0.82);
            --glass-border:        rgba(0, 0, 0, 0.08);
            --glass-border-top:    rgba(255, 255, 255, 0.9);
            --glass-blur:          blur(20px) saturate(140%);
            --glass-shadow-hover:  0 24px 64px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(2, 132, 199, 0.08);
        }

        /* ── Page base (also a fallback if styles.css body rules fail) ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #04040a;
            font-family: 'Geist Mono', monospace;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            
            /* --- BLACK SCREEN BUG FIX --- */
            /* This forces the body to be visible, overriding styles.css */
            opacity: 1 !important;
            visibility: visible !important;
            display: block !important;
        }

        [data-theme="light"] body { background: #f5f0e8; }

        /* ── Layout ────────────────────────────────────────────────────── */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            z-index: 100; /* Increased from 10 to 100 to ensure it's on top */
        }   

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top-color: var(--glass-border-top);
            /* * NOTE: backdrop-filter removed from the card itself.
             * Applying it here causes GPU layer conflicts that make
             * the card invisible on some compositors — exactly the
             * animation-lag class of bug fixed elsewhere in SkyGate.
             * The blur is still present via the ::before shimmer.
             */
            border-radius: var(--r-2xl);
            padding: 48px 40px;
            box-shadow: var(--glass-shadow-hover);
            animation: fadeUp 0.8s var(--ease-out) both;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* ── Form ─────────────────────────────────────────────────────── */
        .form-group { margin-bottom: 24px; }

        .form-label {
            display: block;
            font-family: 'Geist Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 14px 16px;
            color: var(--text);
            font-family: 'Geist Mono', monospace;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        [data-theme="light"] .form-input { background: rgba(0, 0, 0, 0.03); }

        .form-input::placeholder { color: var(--text-muted); opacity: 0.7; }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(58, 223, 255, 0.1);
        }

        /* ── Button — self-contained, no .btn dependency ─────────────── */
        .auth-btn {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border-radius: var(--r-lg);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: var(--accent);
            color: #04040a;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        .auth-btn:hover { box-shadow: 0 0 24px rgba(58, 223, 255, 0.35); }
        .auth-btn:active { transform: scale(0.98); }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Toggle ──────────────────────────────────────────────────── */
        .auth-toggle {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-toggle-btn {
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Geist Mono', monospace;
            padding: 4px;
        }

        /* ── Error / success box ─────────────────────────────────────── */
        .auth-error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: #ff8080;
            padding: 12px;
            border-radius: var(--r-lg);
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
        }

        /* ── Radar rings (decorative bg) ─────────────────────────────── */
        .radar-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(58, 223, 255, 0.05);
            border-radius: 50%;
        }

        /* ── Login loader overlay ─────────────────────────────────────── */
        #login-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #04040a;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 40px;
        }

        #login-loader.active {
            display: flex;
            animation: fadeIn 0.4s var(--ease-out) both;
        }

        .loader-greeting {
            font-family: 'Syne', sans-serif;
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 800;
            color: var(--text);
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
        }

        .loader-catchy {
            font-family: 'Geist Mono', monospace;
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            max-width: 400px;
            line-height: 1.6;
            opacity: 0;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(58, 223, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin-bottom: 40px;
            animation: spin 1s linear infinite;
        }

        #login-loader.active .loader-greeting {
            animation: fadeUp 0.8s var(--ease-out) 0.2s both;
        }

        #login-loader.active .loader-catchy {
            animation: fadeIn 1s ease 0.8s both;
        }

        /* ── Keyframes ────────────────────────────────────────────────── */
        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp  {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body style="opacity: 1 !important; visibility: visible !important; display: block !important;">
    <div id="aurora"></div>

    <div class="radar-bg">
        <div class="radar-ring" style="width:1200px;height:1200px;"></div>
        <div class="radar-ring" style="width:800px;height:800px;"></div>
        <div class="radar-ring" style="width:400px;height:400px;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo" id="header-logo">Welcome to SkyGate!</div>
                <div class="auth-subtitle" id="auth-title">Sign in to your account</div>
            </div>

            <div id="auth-error-box" class="auth-error"></div>

            <form id="auth-form">
                <div class="form-group" id="name-group" style="display:none;">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="full_name" class="form-input" placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required>
                </div>

                <div class="form-group" id="email-group" style="display:none;">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter email">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input"
                        placeholder="••••••••" required minlength="6" maxlength="72">
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <button class="auth-toggle-btn" id="toggle-btn" onclick="toggleAuthMode()">Sign up</button>
            </div>
        </div>
    </div>
    <div id="login-loader">
        <div class="loader-ring"></div>
        <div class="loader-greeting" id="loader-name">Welcome back, Agent</div>
        <div class="loader-catchy" id="loader-msg">Securing the skies...</div>
    </div>

    <script>
        // Use same-origin so auth works regardless of backend port (e.g. :5000).
        const API = window.location.origin;

        // ── Auth mode toggle ─────────────────────────────────────────
        let isLogin = true;

        function toggleAuthMode() {
            isLogin = !isLogin;
            const title      = document.getElementById('auth-title');
            const submitBtn  = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn  = document.getElementById('toggle-btn');
            const errorBox   = document.getElementById('auth-error-box');

            errorBox.style.display = 'none';
            // Reset any success styling
            errorBox.style.background  = '';
            errorBox.style.borderColor = '';
            errorBox.style.color       = '';

            if (isLogin) {
                title.textContent        = 'Sign in to your account';
                submitBtn.textContent    = 'Sign In';
                toggleText.textContent   = "Don't have an account?";
                toggleBtn.textContent    = 'Sign up';
                document.getElementById('email-group').style.display = 'none';
                document.getElementById('name-group').style.display  = 'none';
                document.getElementById('email').required    = false;
                document.getElementById('full_name').required = false;
            } else {
                title.textContent        = 'Create your secure account';
                submitBtn.textContent    = 'Sign Up';
                toggleText.textContent   = 'Already have an account?';
                toggleBtn.textContent    = 'Sign in';
                document.getElementById('email-group').style.display = 'block';
                document.getElementById('name-group').style.display  = 'block';
                document.getElementById('email').required    = true;
                document.getElementById('full_name').required = true;
            }
        }

        // ── Welcome loader ────────────────────────────────────────────
        const CATCHY_MESSAGES = [
            "Securing the skies, one packet at a time.",
            "Aligning ADS-B sensors for maximum precision.",
            "Filtering the noise. Finding the signal.",
            "Your eyes in the sky are now open.",
            "Scanning the horizon for global anomalies...",
            "Decrypting flight patterns across Indian airspace.",
            "SkyGate: Where physics meets intelligence.",
            "Calibrating neural networks for trajectory prediction.",
            "Isolating anomalies in the digital slipstream."
        ];

        function showWelcomeLoader(name) {
            document.getElementById('loader-name').textContent =
                `Welcome back, ${name}!`;
            document.getElementById('loader-msg').textContent =
                CATCHY_MESSAGES[Math.floor(Math.random() * CATCHY_MESSAGES.length)];
            document.getElementById('login-loader').classList.add('active');
            setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        }

        // ── Form submit ───────────────────────────────────────────────
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username  = document.getElementById('username').value.trim();
            const full_name = document.getElementById('full_name').value.trim();
            const password  = document.getElementById('password').value;
            const email     = document.getElementById('email').value.trim();
            const errorBox  = document.getElementById('auth-error-box');
            const submitBtn = document.getElementById('submit-btn');

            errorBox.style.display = 'none';
            submitBtn.disabled     = true;
            submitBtn.textContent  = 'Processing...';

            try {
                const endpoint = isLogin ? '/api/auth/login' : '/api/auth/signup';
                const payload  = isLogin
                    ? `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                    : JSON.stringify({ username, full_name, password, email });

                const response = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': isLogin
                            ? 'application/x-www-form-urlencoded'
                            : 'application/json'
                    },
                    body: payload
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.access_token) {
                        const displayName = data.full_name || username;
                        localStorage.setItem('sg_token', data.access_token);
                        localStorage.setItem('sg_user', username);
                        localStorage.setItem('sg_name', displayName);
                        showWelcomeLoader(displayName);
                    } else if (!isLogin) {
                        // Signup succeeded but no token — prompt sign-in
                        toggleAuthMode();
                        errorBox.style.display     = 'block';
                        errorBox.style.background  = 'rgba(58, 223, 255, 0.1)';
                        errorBox.style.borderColor = 'rgba(58, 223, 255, 0.2)';
                        errorBox.style.color       = 'var(--accent)';
                        errorBox.textContent       = 'Account created! Please sign in.';
                    }
                } else {
                    errorBox.style.display = 'block';
                    errorBox.textContent   = data.detail || 'An error occurred. Please try again.';
                    submitBtn.disabled     = false;
                    submitBtn.textContent  = isLogin ? 'Sign In' : 'Sign Up';
                }
            } catch (err) {
                errorBox.style.display = 'block';
                errorBox.textContent   = 'Connection failed. Is the backend server running?';
                submitBtn.disabled     = false;
                submitBtn.textContent  = isLogin ? 'Sign In' : 'Sign Up';
            }
        });
    </script>
</body>
</html>
